<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h1 class="h4 mb-1 text-center">Admin sign in</h1>
          <p class="text-muted text-center small mb-4">Sign in to manage books and authors.</p>

          <form (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                autocomplete="username"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input
                id="password"
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                autocomplete="current-password"
                required
              />
            </div>
            <button class="btn btn-primary w-100" type="submit" [disabled]="submitting()">
              @if (submitting()) {
                <span class="spinner-border spinner-border-sm me-2"></span>
              }
              Sign in
            </button>
          </form>

          <div class="alert alert-light border mt-4 mb-0 small">
            <strong>Demo admin:</strong> admin&#64;library.com / Admin123!
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
